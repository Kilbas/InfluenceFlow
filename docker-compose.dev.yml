services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: influenceflow
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: influenceflow_dev
    ports:
      - "${DEV_DB_PORT:-5433}:5432"
    volumes:
      - influenceflow_db_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U influenceflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  influenceflow_db_dev:
